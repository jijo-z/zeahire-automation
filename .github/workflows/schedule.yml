name: ZeaHire Automation

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirement.txt
          pip install pytest playwright allure-pytest
          playwright install --with-deps

      # ✅ Run tests (HEADLESS FIX)
      - name: Run Tests
        env:
          HEADLESS: "true"
        continue-on-error: true
        run: |
          pytest -m smoke \
          --alluredir=reports/allure-results \
          --junitxml=reports/junit.xml

      # ✅ Install Allure CLI
      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      # ✅ Generate Allure report (safe)
      - name: Generate Allure Report
        continue-on-error: true
        run: |
          mkdir -p reports/allure-results
          allure generate reports/allure-results --clean -o allure-report || echo "Allure generation failed"

      # 🔥 Ensure index.html exists (NO MORE 404)
      - name: Ensure index.html exists
        run: |
          mkdir -p allure-report
          if [ ! -f allure-report/index.html ]; then
            echo "<h1>No Allure Report Generated</h1>" > allure-report/index.html
          fi

      # 🔥 Debug (optional but useful)
      - name: Debug Files
        run: |
          echo "Allure Report Contents:"
          ls -la allure-report

      # ✅ Deploy ALWAYS
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report