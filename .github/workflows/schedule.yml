name: Zeahire Automation Tests

on:
  schedule:
    - cron: '30 3 * * *'   # 9 AM IST
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Run Smoke Tests
        run: |
          pytest -m smoke -v