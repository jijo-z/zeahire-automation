name: ZeaHire Automation

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirement.txt
          pip install pytest playwright allure-pytest
          playwright install --with-deps

      # ✅ Run tests
      - name: Run Tests
        env:
          HEADLESS: "true"
        continue-on-error: true
        run: |
          pytest -m smoke \
          --alluredir=reports/allure-results \
          --junitxml=reports/junit.xml

      # ✅ Install Allure
      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      # ✅ Generate Allure report
      - name: Generate Allure Report
        continue-on-error: true
        run: |
          mkdir -p reports/allure-results
          allure generate reports/allure-results --clean -o allure-report || echo "Allure generation failed"

      # ✅ Ensure index.html exists
      - name: Ensure index.html exists
        run: |
          mkdir -p allure-report
          if [ ! -f allure-report/index.html ]; then
            echo "<h1>No Allure Report Generated</h1>" > allure-report/index.html
          fi

      # ✅ Upload report
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      # 🚀 Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # 📧 SEND EMAIL (THIS IS NEW)
      - name: Send Email with Report Link
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          python - <<EOF
          import os
          import smtplib
          from email.mime.text import MIMEText

          sender = os.getenv("EMAIL_USER")
          password = os.getenv("EMAIL_PASS")
          receivers = os.getenv("EMAIL_RECEIVERS").split(",")

          report_url = "https://jijo-z.github.io/zeahire-automation/"

          body = f"""
          Automation Execution Completed

          View Full Allure Report:
          {report_url}
          """

          msg = MIMEText(body)
          msg["Subject"] = "ZeaHire Automation Report"
          msg["From"] = sender
          msg["To"] = ", ".join(receivers)

          with smtplib.SMTP("smtp.gmail.com", 587) as server:
              server.starttls()
              server.login(sender, password)
              server.sendmail(sender, receivers, msg.as_string())
          EOF