name: ZeaHire Automation

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirement.txt
          pip install pytest playwright allure-pytest
          playwright install --with-deps

      # ✅ Run tests (HEADLESS + DO NOT FAIL PIPELINE)
      - name: Run Tests
        env:
          HEADLESS: "true"
        continue-on-error: true
        run: |
          pytest -m smoke \
          --alluredir=reports/allure-results \
          --junitxml=reports/junit.xml

      # ✅ Install Allure
      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      # ✅ Generate Allure report (DO NOT FAIL)
      - name: Generate Allure Report
        continue-on-error: true
        run: |
          allure generate reports/allure-results --clean -o allure-report

      # 🔥 DEBUG (IMPORTANT - ensures folder exists)
      - name: Verify Report Folder
        run: |
          ls -la
          ls -la allure-report || echo "No report generated"

      # ✅ Deploy ALWAYS (KEY FIX)
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report