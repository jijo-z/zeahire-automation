name: ZeaHire Automation

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔹 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 🔹 Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      # 🔹 Run tests
      - name: Run Tests
        run: |
          pytest --alluredir=allure-results

      # 🔹 Install Allure
      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # 🔹 Generate Allure Report
      - name: Generate Allure Report
        run: |
          allure generate allure-results -o allure-report --clean

      # 🔹 Upload report artifact
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      # 🔹 Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # 🔹 Send Email (ONLY runs if everything above passed)
      - name: Send Email with Report Link
        if: success()
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          python - <<EOF
          import os
          import smtplib
          from email.mime.text import MIMEText

          sender = os.getenv("EMAIL_USER")
          password = os.getenv("EMAIL_PASS")
          receivers = os.getenv("EMAIL_RECEIVERS").split(",")

          report_url = "https://jijo-z.github.io/zeahire-automation/"

          body = f"""
          ZeaHire Automation Execution Completed ✅

          View Full Report:
          {report_url}
          """

          msg = MIMEText(body)
          msg["Subject"] = "ZeaHire Automation Report"
          msg["From"] = sender
          msg["To"] = ", ".join(receivers)

          with smtplib.SMTP("smtp.gmail.com", 587) as server:
              server.starttls()
              server.login(sender, password)
              server.sendmail(sender, receivers, msg.as_string())
          EOF